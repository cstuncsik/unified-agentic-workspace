# pnpm settings (pnpm >= 10 reads project settings from here, not package.json).
# Allow these dependencies to run their install/build scripts:
#   - esbuild: fetches its native binary, required by Vite
#   - vue-demi: switches its Vue 2/3 entry point, required by Pinia
# edgedriver/geckodriver come in transitively via @wdio/cli but are unused
# (the app is driven through tauri-driver), so their downloads stay off.
allowBuilds:
  edgedriver: false
  esbuild: true
  geckodriver: false
  vue-demi: true
minimumReleaseAgeExclude:
  - "@relements/core@1.0.0"
