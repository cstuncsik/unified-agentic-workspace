name: e2e

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # tauri-driver supports Linux and Windows only (no macOS WKWebView driver),
    # so the real-app e2e gate runs on Linux.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux WebKit + WebDriver deps
        # base webkit/gtk/appindicator set is shared with .github/workflows/release.yml — keep in sync
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev \
            webkit2gtk-driver xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --version 2.0.6 --locked

      - name: Build debug app
        run: pnpm e2e:build

      - name: Run e2e tests
        # run-e2e.sh manages Xvfb itself (xvfb-run deadlocks with wdio workers).
        run: bash scripts/run-e2e.sh
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
